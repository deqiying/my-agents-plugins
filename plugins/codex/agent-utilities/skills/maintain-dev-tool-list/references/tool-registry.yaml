schema_version: 1
source: "Seeded from sanitized mise active tools; real install and config paths are represented with placeholders."
placeholders:
  home: "<HOME>"
  global_mise_config: "<GLOBAL_MISE_CONFIG>"
  local_mise_config: "<LOCAL_MISE_CONFIG>"
  mise_data_dir: "<MISE_DATA_DIR>"
tools:
  - id: "doggo"
    command: "doggo"
    manager: "mise"
    category: "utility"
    version_policy: "latest"
    check:
      - "doggo --version"
    notes: "DNS lookup utility used for quick network diagnostics."
  - id: "github:flupkede/codesearch"
    command: "codesearch"
    manager: "mise"
    category: "agent-tool"
    version_policy: "latest"
    check:
      - "codesearch --version"
      - "codesearch doctor"
    notes: "Semantic local code search CLI for agent codebase discovery."
  - id: "github:iOfficeAI/OfficeCLI"
    command: "officecli"
    manager: "mise"
    category: "agent-tool"
    version_policy: "latest"
    check:
      - "officecli --version"
      - "officecli help"
    notes: "Office document inspection, editing, validation, and rendering CLI."
  - id: "npm:onesearch"
    command: "onesearch"
    manager: "mise"
    category: "agent-tool"
    version_policy: "latest"
    check:
      - "onesearch --version"
      - "onesearch doctor --format json"
      - "onesearch skills list --format json"
    notes: "Onesearch CLI for source-backed web research, docs lookup, URL fetch, site crawl, and public repo context; install through the mise npm backend when missing for the Onesearch skill."
  - id: "go"
    command: "go"
    manager: "mise"
    category: "runtime"
    version_policy: "1.26.1"
    check:
      - "go version"
    notes: "Go runtime and toolchain."
  - id: "node"
    command: "node"
    manager: "mise"
    category: "runtime"
    version_policy: "latest"
    check:
      - "node --version"
      - "npm --version"
    notes: "Node.js runtime used by frontend, CLI, and agent tooling."
  - id: "npm:@openai/codex"
    command: "codex"
    manager: "mise"
    category: "agent-tool"
    version_policy: "0.120.0"
    check:
      - "codex --version"
    notes: "Codex CLI installed through mise npm backend."
  - id: "pnpm"
    command: "pnpm"
    manager: "mise"
    category: "package-manager"
    version_policy: "latest"
    check:
      - "pnpm --version"
    notes: "Node package manager."
  - id: "python"
    command: "python"
    manager: "mise"
    category: "runtime"
    version_policy: "latest"
    check:
      - "python --version"
    notes: "Python runtime for scripts and local automation."
  - id: "uv"
    command: "uv"
    manager: "mise"
    category: "package-manager"
    version_policy: "latest"
    check:
      - "uv --version"
    notes: "Python package and project tool."
manager_notes:
  scoop:
    platform: "windows"
    role: "Windows package manager and prerequisite path for mise."
  mise:
    platform: "windows-macos-linux"
    role: "Cross-platform runtime and agent tool manager."
  brew:
    platform: "macos"
    role: "macOS package manager for tools better managed through Homebrew."
